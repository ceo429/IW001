<!doctype html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#eab308" />
    <title>IOTWORKS DESK — Phase 0 Demo</title>

    <!-- Pretendard via jsDelivr (per 기획서 §2.1) -->
    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />

    <style>
      /* ──────────────────────────────────────────────────────────────
         CSS reset + theme variables
      ────────────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Pretendard Variable', Pretendard, -apple-system,
          BlinkMacSystemFont, system-ui, sans-serif;
        font-feature-settings: 'ss01', 'ss02';
        min-height: 100vh;
        color-scheme: dark;
      }
      button { font-family: inherit; cursor: pointer; }
      input, select, textarea { font-family: inherit; }

      :root {
        --brand-50: #fefce8;
        --brand-400: #facc15;
        --brand-500: #eab308;
        --brand-600: #ca9a06;
      }
      html.dark {
        --bg: #0a0a0a;
        --bg-raised: #171717;
        --bg-muted: #262626;
        --border: #262626;
        --border-strong: #404040;
        --text: #e5e5e5;
        --text-muted: #a3a3a3;
        --text-faint: #737373;
      }
      html.light {
        color-scheme: light;
        --bg: #fafafa;
        --bg-raised: #ffffff;
        --bg-muted: #f5f5f5;
        --border: #e5e5e5;
        --border-strong: #d4d4d4;
        --text: #171717;
        --text-muted: #525252;
        --text-faint: #a3a3a3;
      }
      body { background: var(--bg); color: var(--text); }

      /* ──────────────────────────────────────────────────────────────
         Layout primitives
      ────────────────────────────────────────────────────────────── */
      .hidden { display: none !important; }

      .card {
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 16px;
        border-radius: 8px;
        border: 1px solid transparent;
        font-size: 14px;
        font-weight: 500;
        transition: background 0.15s, border-color 0.15s, transform 0.05s;
      }
      .btn:active { transform: translateY(1px); }
      .btn-primary {
        background: var(--brand-500);
        color: #0a0a0a;
      }
      .btn-primary:hover { background: var(--brand-400); }
      .btn-secondary {
        background: var(--bg-muted);
        color: var(--text);
        border-color: var(--border-strong);
      }
      .btn-secondary:hover { background: var(--border); }

      .input {
        width: 100%;
        padding: 10px 12px;
        background: var(--bg-muted);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        color: var(--text);
        font-size: 14px;
        outline: none;
      }
      .input:focus {
        border-color: var(--brand-500);
        box-shadow: 0 0 0 1px var(--brand-500);
      }

      .label {
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        color: var(--text-muted);
        font-weight: 500;
      }

      /* ──────────────────────────────────────────────────────────────
         Login screen
      ────────────────────────────────────────────────────────────── */
      #login {
        display: flex;
        min-height: 100vh;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .login-card {
        width: 100%;
        max-width: 380px;
        padding: 32px;
        background: var(--bg-raised);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .login-logo {
        width: 48px;
        height: 48px;
        margin: 0 auto 12px;
        border-radius: 12px;
        background: var(--brand-500);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        color: #0a0a0a;
        font-size: 20px;
      }
      .login-title { text-align: center; margin: 0 0 4px; font-size: 18px; }
      .login-sub { text-align: center; margin: 0 0 24px; font-size: 11px; color: var(--text-faint); }

      /* ──────────────────────────────────────────────────────────────
         App shell
      ────────────────────────────────────────────────────────────── */
      #app { display: none; min-height: 100vh; }
      #app.visible { display: flex; }

      .sidebar {
        width: 256px;
        flex-shrink: 0;
        border-right: 1px solid var(--border);
        background: var(--bg-raised);
        display: flex;
        flex-direction: column;
        max-height: 100vh;
        position: sticky;
        top: 0;
      }
      .sidebar-header {
        display: flex;
        align-items: center;
        gap: 8px;
        height: 56px;
        padding: 0 16px;
        border-bottom: 1px solid var(--border);
      }
      .sidebar-logo {
        width: 28px; height: 28px; border-radius: 8px;
        background: var(--brand-500);
      }
      .sidebar-title { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }

      .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 12px 8px;
        font-size: 13px;
      }
      .nav-group { margin-bottom: 16px; }
      .nav-group-label {
        padding: 4px 8px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-faint);
        font-weight: 600;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 8px;
        color: var(--text-muted);
        text-decoration: none;
        width: 100%;
        border: none;
        background: none;
        text-align: left;
        font-size: 13px;
        position: relative;
      }
      .nav-item:hover { background: var(--bg-muted); color: var(--text); }
      .nav-item.active { background: rgba(234, 179, 8, 0.1); color: var(--brand-400); }
      .nav-item img { width: 20px; height: 20px; flex-shrink: 0; }
      .nav-item .fav {
        position: absolute;
        right: 8px;
        color: var(--text-faint);
        font-size: 10px;
      }
      .nav-item:hover .fav { color: var(--brand-400); }

      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        height: 56px;
        padding: 0 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--bg-raised);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .topbar-search {
        flex: 1;
        max-width: 400px;
      }
      .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
      }
      .user-chip .role { color: var(--text-faint); font-size: 10px; }

      .content {
        padding: 24px;
        max-width: 1280px;
        margin: 0 auto;
        width: 100%;
      }

      /* ──────────────────────────────────────────────────────────────
         Page — Dashboard
      ────────────────────────────────────────────────────────────── */
      .page-header {
        margin-bottom: 24px;
      }
      .page-header .eyebrow {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-faint);
      }
      .page-header h1 {
        margin: 4px 0 0;
        font-size: 24px;
        font-weight: 700;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 24px;
      }
      .kpi { padding: 20px; }
      .kpi .kpi-label {
        font-size: 11px;
        color: var(--text-faint);
      }
      .kpi .kpi-value {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 700;
        color: var(--brand-400);
      }
      .kpi .kpi-hint {
        margin-top: 4px;
        font-size: 11px;
        color: var(--text-faint);
      }

      .split {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 16px;
      }
      @media (max-width: 900px) {
        .split { grid-template-columns: 1fr; }
      }

      .chart-host {
        width: 100%;
        height: 240px;
        display: block;
      }

      .alert-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
      .alert-item {
        border-left: 2px solid var(--brand-500);
        padding-left: 12px;
      }
      .alert-item .alert-title { font-size: 13px; font-weight: 500; }
      .alert-item .alert-when { font-size: 11px; color: var(--text-faint); }

      /* Phase 0 placeholder card */
      .phase-card {
        text-align: center;
        padding: 48px 24px;
      }
      .phase-card .icon-big {
        width: 64px; height: 64px;
        margin: 0 auto 12px;
      }
      .phase-card .icon-big img { width: 100%; height: 100%; }
      .phase-card h2 { margin: 0 0 8px; font-size: 18px; }
      .phase-card p { margin: 0 auto; max-width: 420px; color: var(--text-muted); font-size: 13px; }
      .phase-card code {
        display: inline-block;
        margin-top: 12px;
        padding: 4px 8px;
        background: var(--bg-muted);
        border-radius: 4px;
        font-size: 11px;
        color: var(--brand-400);
      }

      /* Toast */
      #toast-root {
        position: fixed;
        top: 72px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 100;
      }
      .toast {
        padding: 12px 16px;
        background: var(--bg-raised);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        font-size: 13px;
        min-width: 240px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        animation: slide-in 0.2s ease-out;
      }
      .toast.success { border-color: #22c55e; }
      .toast.error { border-color: #ef4444; }
      @keyframes slide-in {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }

      /* Small utility */
      .muted { color: var(--text-muted); }
      .faint { color: var(--text-faint); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .text-xs { font-size: 11px; }
      .text-sm { font-size: 13px; }
      .mt-2 { margin-top: 8px; }
      .mt-4 { margin-top: 16px; }
      .flex { display: flex; }
      .items-center { align-items: center; }
      .gap-2 { gap: 8px; }
      .gap-4 { gap: 16px; }
    </style>
  </head>

  <body>
    <!-- ─── LOGIN ─── -->
    <div id="login">
      <form class="login-card" onsubmit="return onLogin(event)">
        <div class="login-logo">I</div>
        <h1 class="login-title">IOTWORKS DESK</h1>
        <p class="login-sub">IoT 통합 유지보수·운영 대시보드 (Phase 0 Demo)</p>

        <label class="label" for="login-email">이메일</label>
        <input
          id="login-email"
          type="email"
          class="input"
          value="admin@iotworks.kr"
          required
          autocomplete="username"
        />

        <label class="label" for="login-password" style="margin-top: 16px">비밀번호</label>
        <input
          id="login-password"
          type="password"
          class="input"
          value="demo"
          required
          autocomplete="current-password"
        />

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px">
          로그인
        </button>

        <p class="text-xs faint mt-4" style="text-align: center">
          데모 로그인: 아무 값이나 입력 후 로그인
        </p>
      </form>
    </div>

    <!-- ─── APP SHELL ─── -->
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo"></div>
          <div class="sidebar-title">IOTWORKS DESK</div>
        </div>
        <nav class="sidebar-nav" id="sidebar-nav"></nav>
      </aside>

      <div class="main">
        <header class="topbar">
          <input
            type="search"
            class="input topbar-search"
            placeholder="검색 (기기·장소·프로젝트·견적·품목)"
            aria-label="통합 검색"
          />
          <div class="topbar-right">
            <button type="button" class="btn btn-secondary" onclick="toggleTheme()" id="theme-btn">
              🌙 다크
            </button>
            <div class="user-chip">
              <div>
                <div id="user-name">관리자</div>
                <div class="role" id="user-role">admin</div>
              </div>
              <button class="btn btn-secondary" onclick="onLogout()" style="padding: 4px 12px; font-size: 11px">
                로그아웃
              </button>
            </div>
          </div>
        </header>

        <main class="content" id="page-host">
          <!-- Page content rendered here -->
        </main>
      </div>
    </div>

    <div id="toast-root" aria-live="polite"></div>

    <script>
      // ═══════════════════════════════════════════════════════════════
      //   DATA — 7 groups × 19 pages
      // ═══════════════════════════════════════════════════════════════
      const GROUP_LABELS = {
        monitoring: '모니터링',
        operations: '운영',
        finance: '재무',
        analytics: '분석',
        customers: '고객',
        management: '관리',
        system: '시스템',
      };
      const GROUP_ORDER = [
        'monitoring', 'operations', 'finance', 'analytics',
        'customers', 'management', 'system',
      ];

      const PAGES = [
        { id: 'dashboard',     label: '대시보드',          group: 'monitoring', icon: 'dashboard' },
        { id: 'accounts',      label: '계정관리(헤이홈)',  group: 'monitoring', icon: 'accounts' },
        { id: 'home-status',   label: '장소별 현황',        group: 'monitoring', icon: 'home-status' },

        { id: 'spatial',       label: '공간매핑',          group: 'operations', icon: 'spatial' },
        { id: 'projects',      label: '프로젝트 & 태스크', group: 'operations', icon: 'projects' },
        { id: 'announcements', label: '공지사항',          group: 'operations', icon: 'announcements' },
        { id: 'as-intake',     label: 'AS 인입건',         group: 'operations', icon: 'as-intake' },

        { id: 'quotes',        label: '견적서',            group: 'finance',    icon: 'quotes' },
        { id: 'products',      label: '품목관리',          group: 'finance',    icon: 'products' },

        { id: 'stats',         label: '통계',              group: 'analytics',  icon: 'stats' },
        { id: 'period-stats',  label: '기간별 상세통계',    group: 'analytics',  icon: 'period-stats' },
        { id: 'okr',           label: 'OKR & KPI',         group: 'analytics',  icon: 'okr' },

        { id: 'customers',     label: '고객관리',          group: 'customers',  icon: 'customers' },

        { id: 'approvals',     label: '결재센터',          group: 'management', icon: 'approvals' },
        { id: 'maintenance',   label: '유지보수',          group: 'management', icon: 'maintenance' },
        { id: 'as-guide',      label: 'AS 가이드',         group: 'management', icon: 'as-guide' },

        { id: 'alarms',        label: '알림관리',          group: 'system',     icon: 'alarms' },
        { id: 'audit',         label: '감사로그',          group: 'system',     icon: 'audit' },
        { id: 'admin',         label: '관리자 설정',        group: 'system',     icon: 'admin' },
      ];

      // Seed data — pure mock, resets on reload
      const SEED = {
        kpis: [
          { label: '전체 계정',    value: '42',    hint: '+3 vs 지난주' },
          { label: '총 장소',       value: '128',   hint: '5개 신규' },
          { label: '총 기기',       value: '2,341', hint: '24h 변동 없음' },
          { label: '온라인율',     value: '96.4%', hint: '목표 95% 이상' },
        ],
        yearly: [
          { label: '2019', value: 34 },  { label: '2020', value: 52 },
          { label: '2021', value: 48 },  { label: '2022', value: 71 },
          { label: '2023', value: 88 },  { label: '2024', value: 96 },
          { label: '2025', value: 108 }, { label: '2026', value: 124 },
        ],
        alerts: [
          { id: 1, title: '공릉 해링턴 — 허브 오프라인',               when: '2분 전' },
          { id: 2, title: '프렌즈스크린 서초 — 센서 배터리 20%',        when: '24분 전' },
          { id: 3, title: '김캐디 골프존S — 견적 QT-2026-0042 승인 대기', when: '1시간 전' },
          { id: 4, title: '스마트상점 서강 — AS 접수 (스위치 무응답)',    when: '3시간 전' },
          { id: 5, title: '판도 당산 — 정기 점검 일정 (내일)',            when: '어제' },
        ],
      };

      // ═══════════════════════════════════════════════════════════════
      //   STATE (localStorage-backed where it makes sense)
      // ═══════════════════════════════════════════════════════════════
      const state = {
        user: null,
        currentPage: 'dashboard',
        theme: localStorage.getItem('iw001.theme') || 'dark',
        favorites: JSON.parse(localStorage.getItem('iw001.favorites') || '["dashboard","quotes"]'),
      };

      function saveFavorites() {
        localStorage.setItem('iw001.favorites', JSON.stringify(state.favorites));
      }
      function saveTheme() {
        localStorage.setItem('iw001.theme', state.theme);
      }

      // ═══════════════════════════════════════════════════════════════
      //   THEME
      // ═══════════════════════════════════════════════════════════════
      function applyTheme() {
        const root = document.documentElement;
        if (state.theme === 'dark') {
          root.classList.add('dark'); root.classList.remove('light');
        } else {
          root.classList.add('light'); root.classList.remove('dark');
        }
        const btn = document.getElementById('theme-btn');
        if (btn) btn.textContent = state.theme === 'dark' ? '🌙 다크' : '☀️ 라이트';
      }
      function toggleTheme() {
        state.theme = state.theme === 'dark' ? 'light' : 'dark';
        saveTheme(); applyTheme();
      }
      applyTheme();

      // ═══════════════════════════════════════════════════════════════
      //   AUTH (demo — accepts anything)
      // ═══════════════════════════════════════════════════════════════
      function onLogin(event) {
        event.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        // Parse a role from the email prefix for fun
        const role = email.startsWith('admin')
          ? 'admin'
          : email.startsWith('manager')
            ? 'manager'
            : email.startsWith('engineer')
              ? 'engineer'
              : 'viewer';
        state.user = { email, name: role === 'admin' ? '최고관리자' : email.split('@')[0], role };

        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.add('visible');
        document.getElementById('user-name').textContent = state.user.name;
        document.getElementById('user-role').textContent = role;

        renderSidebar();
        navigate('dashboard');
        toast('success', `${state.user.name} 님 환영합니다`);
        return false;
      }

      function onLogout() {
        state.user = null;
        document.getElementById('login').classList.remove('hidden');
        document.getElementById('app').classList.remove('visible');
      }

      // ═══════════════════════════════════════════════════════════════
      //   NAVIGATION + SIDEBAR
      // ═══════════════════════════════════════════════════════════════
      // Page renderers that have real CRUD
      const LIVE_PAGES = { dashboard: renderDashboard, products: renderProducts, customers: renderCustomers, quotes: renderQuotes };

      function navigate(pageId) {
        state.currentPage = pageId;
        renderSidebar();
        const host = document.getElementById('page-host');
        const page = PAGES.find((p) => p.id === pageId);
        if (!page) { host.innerHTML = '<p>페이지를 찾을 수 없습니다.</p>'; return; }
        const renderer = LIVE_PAGES[pageId];
        if (renderer) renderer(host);
        else renderPlaceholder(host, page);
      }

      function renderSidebar() {
        const host = document.getElementById('sidebar-nav');
        const groups = new Map();
        for (const page of PAGES) {
          if (!groups.has(page.group)) groups.set(page.group, []);
          groups.get(page.group).push(page);
        }

        let html = '';

        // Favorites group (if any)
        if (state.favorites.length > 0) {
          html += '<div class="nav-group">';
          html += `<div class="nav-group-label">★ 즐겨찾기</div>`;
          for (const favId of state.favorites) {
            const page = PAGES.find((p) => p.id === favId);
            if (page) html += navItemHtml(page, true);
          }
          html += '</div>';
        }

        for (const groupId of GROUP_ORDER) {
          const pages = groups.get(groupId) || [];
          if (pages.length === 0) continue;
          html += '<div class="nav-group">';
          html += `<div class="nav-group-label">${GROUP_LABELS[groupId]}</div>`;
          for (const page of pages) html += navItemHtml(page, false);
          html += '</div>';
        }

        host.innerHTML = html;

        // Attach click handlers (delegated)
        host.querySelectorAll('[data-page]').forEach((el) => {
          el.addEventListener('click', (e) => {
            if (e.target.classList.contains('fav')) {
              toggleFavorite(el.dataset.page);
              e.stopPropagation();
              return;
            }
            navigate(el.dataset.page);
          });
        });
      }

      function navItemHtml(page, inFavSection) {
        const active = state.currentPage === page.id ? 'active' : '';
        const isFav = state.favorites.includes(page.id);

      // ═══════════════════════════════════════════════════════════════
      //   CANVAS LINE CHART (tiny, self-contained)
      // ═══════════════════════════════════════════════════════════════
      function drawLineChart(canvasId, data) {
        const canvas = document.getElementById(canvasId);
        if (!canvas) return;

        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.round(rect.width * dpr);
        canvas.height = Math.round(rect.height * dpr);
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const w = rect.width, h = rect.height;
        const padX = 32, padTop = 12, padBottom = 24;
        const chartW = w - padX * 2;
        const chartH = h - padTop - padBottom;
        const max = Math.max(1, ...data.map((d) => d.value));

        ctx.clearRect(0, 0, w, h);
        ctx.font = '500 10px Pretendard Variable, Pretendard, sans-serif';
        ctx.textBaseline = 'middle';

        // Gridlines + y labels
        ctx.strokeStyle = '#262626';
        ctx.fillStyle = '#737373';
        ctx.lineWidth = 1;
        const steps = 4;
        for (let i = 0; i <= steps; i++) {
          const y = padTop + (chartH / steps) * i;
          ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(padX + chartW, y); ctx.stroke();
          ctx.textAlign = 'right';
          ctx.fillText(String(Math.round(max - (max / steps) * i)), padX - 6, y);
        }

        // Line
        const step = data.length === 1 ? 0 : chartW / (data.length - 1);
        const points = data.map((d, i) => [
          padX + step * i,
          padTop + chartH - (d.value / max) * chartH,
        ]);
        ctx.strokeStyle = '#eab308';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        points.forEach(([x, y], i) => (i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y)));
        ctx.stroke();

        // Point dots
        ctx.fillStyle = '#facc15';
        points.forEach(([x, y]) => {
          ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
        });

        // X labels
        ctx.fillStyle = '#737373';
        ctx.textAlign = 'center';
        data.forEach((d, i) => {
          ctx.fillText(d.label, points[i][0], padTop + chartH + 12);
        });
      }

      // Redraw the chart on resize
      window.addEventListener('resize', () => {
        if (state.currentPage === 'dashboard' && state.user) {

        }

      // ═══════════════════════════════════════════════════════════════
      function toast(tone, message) {
        const root = document.getElementById('toast-root');
        const el = document.createElement('div');
        el.className = `toast ${tone}`;
        el.textContent = message;
        root.appendChild(el);
        setTimeout(() => {
          el.style.opacity = '0';
          el.style.transition = 'opacity 0.2s';
          setTimeout(() => el.remove(), 200);
        }, 2600);
      }

                      <td style="text-align:right; padding:6px 0; color:var(--text-faint);">${it.discount?it.discount+'%':'—'}</td>
                      <td style="text-align:right; padding:6px 0; font-family:monospace;">${KRW.format(it.lineTotal)}</td>
                    </tr>`).join('')}
                  </tbody>
                </table>
                <div style="margin-top:12px; border-top:1px solid var(--border); padding-top:8px; display:flex; justify-content:space-between; font-size:12px;">
                  <span class="faint">공급가 ${KRW.format(q.subtotal)} · 부가세(10%) ${KRW.format(q.vat)}</span>
                  <button class="btn btn-secondary" style="padding:4px 8px; font-size:11px; color:#ef4444;" onclick="deleteQuote('${q.id}')">삭제</button>
                </div>
              </div>`;
            }).join('')}
          </div>
        `;
      }

      function openQuoteModal() {
        if (customers.length === 0) { toast('error', '고객사를 먼저 등록하세요.'); return; }
        if (products.length === 0) { toast('error', '품목을 먼저 등록하세요.'); return; }
        // Build a dynamic form for adding quote items
        let items = [{ productId: products[0].id, qty: 1, discount: 0 }];

        function renderItems() {
          const container = document.getElementById('quote-items');
          if (!container) return;
          container.innerHTML = items.map((it, i) => {
            const p = products.find(x => x.id === it.productId);
            const lineTotal = Math.round((p?.price||0) * it.qty * (1 - it.discount/100));
            return `<div style="display:grid; grid-template-columns:2fr 60px 70px 60px 30px; gap:4px; align-items:center; margin-bottom:4px;">
              <select class="input" style="padding:6px 8px; font-size:12px;" onchange="quoteItemChange(${i},'productId',this.value)">
                ${products.map(pr => `<option value="${pr.id}" ${pr.id===it.productId?'selected':''}>${pr.name} (${KRW.format(pr.price)})</option>`).join('')}
              </select>
              <input class="input" type="number" min="1" value="${it.qty}" style="padding:6px 4px; font-size:12px; text-align:center;" onchange="quoteItemChange(${i},'qty',this.value)" />
              <div style="text-align:right; font-family:monospace; font-size:12px; color:var(--brand-400);">${KRW.format(lineTotal)}</div>
              <input class="input" type="number" min="0" max="100" value="${it.discount}" style="padding:6px 4px; font-size:11px; text-align:center;" onchange="quoteItemChange(${i},'discount',this.value)" placeholder="%" />
              <button type="button" style="background:none; border:none; color:var(--text-faint); cursor:pointer;" onclick="quoteItemRemove(${i})">✕</button>
            </div>`;
          }).join('');
          // Summary
          const totals = calcQuoteTotals(items);
          document.getElementById('quote-summary').innerHTML = `
            공급가 <b style="color:var(--brand-400)">${KRW.format(totals.subtotal)}</b> +
            부가세(10%) <b>${KRW.format(totals.vat)}</b> =
            합계 <b style="color:var(--brand-400); font-size:16px;">${KRW.format(totals.total)}</b>
            <div class="text-xs faint mt-2">이 금액은 브라우저 미리보기입니다.</div>
          `;
        }

        // Expose helpers to global for inline handlers
        window.quoteItemChange = (i, key, val) => {
          if (key === 'qty') items[i].qty = Math.max(1, Number(val)||1);
          else if (key === 'discount') items[i].discount = Math.min(100, Math.max(0, Number(val)||0));
          else items[i][key] = val;
          renderItems();
        };
        window.quoteItemRemove = (i) => { items.splice(i, 1); if (items.length === 0) items.push({ productId: products[0].id, qty: 1, discount: 0 }); renderItems(); };
        window.quoteItemAdd = () => { items.push({ productId: products[0].id, qty: 1, discount: 0 }); renderItems(); };

        showModal('새 견적서', `
          <label class="label">고객사 *</label>
          <select class="input" id="m-qcust">${customers.map(c => `<option value="${c.id}">${escapeHtml(c.name)}</option>`).join('')}</select>
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:16px;">
            <label class="label" style="margin:0;">품목</label>
            <button type="button" class="btn btn-secondary" style="padding:4px 8px; font-size:11px;" onclick="quoteItemAdd()">+ 라인 추가</button>
          </div>
          <div style="margin-top:8px; font-size:10px; color:var(--text-faint); display:grid; grid-template-columns:2fr 60px 70px 60px 30px; gap:4px;">
            <span>품목</span><span style="text-align:center">수량</span><span style="text-align:right">소계</span><span style="text-align:center">할인%</span><span></span>
          </div>
          <div id="quote-items"></div>
          <div id="quote-summary" style="margin-top:12px; padding:12px; background:var(--bg-muted); border-radius:8px; font-size:13px;"></div>
        `, () => {
          const customerId = document.getElementById('m-qcust').value;
          const totals = calcQuoteTotals(items);
          const code = `QT-${new Date().getFullYear()}-${String(quoteSeq++).padStart(4,'0')}`;
          saveStore('iw001.quoteSeq', quoteSeq);
          const resolvedItems = items.map(it => {
            const p = products.find(x => x.id === it.productId);
            const lineTotal = Math.round((p?.price||0) * it.qty * (1 - it.discount/100));
            return { name: p?.name||'?', qty: it.qty, price: p?.price||0, discount: it.discount, lineTotal };
          });
          quotes.unshift({ id: genId(), code, customerId, date: new Date().toLocaleDateString('ko-KR'), items: resolvedItems, subtotal: totals.subtotal, vat: totals.vat, total: totals.total });
          saveQuotes(); navigate('quotes'); toast('success', `견적서 ${code} 생성됨`);
        });
        // Initial render of items
        setTimeout(renderItems, 0);
      }

      function calcQuoteTotals(items) {
        let subtotal = 0;
        for (const it of items) {
          const p = products.find(x => x.id === it.productId);
          subtotal += Math.round((p?.price||0) * it.qty * (1 - it.discount/100));
        }
        const vat = Math.round(subtotal * 0.1);
        return { subtotal, vat, total: subtotal + vat };
      }

      function deleteQuote(id) {
        if (!confirm('이 견적서를 삭제하시겠습니까?')) return;
        quotes = quotes.filter(q => q.id !== id);
        saveQuotes(); navigate('quotes'); toast('success', '견적서 삭제됨');
      }

      // ═══════════════════════════════════════════════════════════════
      //   MODAL (reusable overlay)
      // ═══════════════════════════════════════════════════════════════
      let _modalOnSave = null;
      function showModal(title, bodyHtml, onSave) {
        _modalOnSave = onSave;
        let overlay = document.getElementById('modal-overlay');
        if (!overlay) {
          overlay = document.createElement('div');
          overlay.id = 'modal-overlay';
          overlay.style.cssText = 'position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);padding:16px;';
          overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
          document.body.appendChild(overlay);
        }
        overlay.innerHTML = `
          <div style="width:100%;max-width:520px;background:var(--bg-raised);border:1px solid var(--border-strong);border-radius:16px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
              <h2 style="margin:0;font-size:18px;">${title}</h2>
              <button type="button" style="background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:16px;" onclick="closeModal()">✕</button>
            </div>
            <div>${bodyHtml}</div>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:20px;">
              <button class="btn btn-secondary" onclick="closeModal()">취소</button>
              <button class="btn btn-primary" onclick="submitModal()">저장</button>
            </div>
          </div>
        `;
        overlay.style.display = 'flex';
      }
      function closeModal() {
        const overlay = document.getElementById('modal-overlay');
        if (overlay) overlay.style.display = 'none';
        _modalOnSave = null;
      }
      function submitModal() {
        if (_modalOnSave) {
          const result = _modalOnSave();
          if (result === false) return; // validation failed
        }
        closeModal();
      }
    </script>
  </body>
</html>
